app = "friday-fileflow"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7771"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 7771
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[mounts]]
  source = "friday_data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
